<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow - Ventas</title>
    <link rel="stylesheet" href="css/ventas.css">
</head>
<body>
    <main class="ventas">

    
    <header class="ventas__header">
        <h1>Ventas</h1>
        <p>Seleccione los productos que desea vender.</p>
    </header>

    <section class="ventas__contenido">

     
        <section class="lista-productos">

            <article class="producto">

                <div class="producto__informacion">
                    <h2 class="producto__nombre">Mouse Gamer RGB</h2>
                    <p class="producto__categoria">Periféricos</p>
                    <span class="producto__precio">$850</span>
                    <span class="producto__stock">Stock: 18</span>
                </div>

                <div class="producto__acciones">

                    <div class="selector-cantidad">

                        <button type="button" class="cantidad__btn">
                            −
                        </button>

                        <span class="cantidad__valor">
                            1
                        </span>

                        <button type="button" class="cantidad__btn">
                            +
                        </button>

                    </div>

                    <button type="button" class="btn-agregar">
                        Agregar al carrito
                    </button>

                </div>

            </article>

            <article class="producto">

                <div class="producto__informacion">
                    <h2 class="producto__nombre">Teclado Mecánico</h2>
                    <p class="producto__categoria">Periféricos</p>
                    <span class="producto__precio">$2.150</span>
                    <span class="producto__stock">Stock: 9</span>
                </div>

                <div class="producto__acciones">

                    <div class="selector-cantidad">

                        <button type="button" class="cantidad__btn">
                            −
                        </button>

                        <span class="cantidad__valor">
                            1
                        </span>

                        <button type="button" class="cantidad__btn">
                            +
                        </button>

                    </div>

                    <button type="button" class="btn-agregar">
                        Agregar al carrito
                    </button>

                </div>

            </article>

            <article class="producto">

                <div class="producto__informacion">
                    <h2 class="producto__nombre">Auriculares Bluetooth</h2>
                    <p class="producto__categoria">Audio</p>
                    <span class="producto__precio">$1.490</span>
                    <span class="producto__stock">Stock: 12</span>
                </div>

                <div class="producto__acciones">

                    <div class="selector-cantidad">

                        <button type="button" class="cantidad__btn">
                            −
                        </button>

                        <span class="cantidad__valor">
                            1
                        </span>

                        <button type="button" class="cantidad__btn">
                            +
                        </button>

                    </div>

                    <button type="button" class="btn-agregar">
                        Agregar al carrito
                    </button>

                </div>

            </article>

        </section>

        <aside class="carrito">

            <header class="carrito__header">
                <h2>Carrito</h2>
            </header>

            <section class="carrito__contenido">

                <p class="carrito__vacio">
                    No hay productos agregados.
                </p>

            </section>

            <footer class="carrito__footer">

                <div class="carrito__total">
                    <span>Total</span>
                    <strong>$0</strong>
                </div>

                <button type="button" class="btn-finalizar">
                    Finalizar venta
                </button>

            </footer>

        </aside>

    </section>

</main>
</body>
